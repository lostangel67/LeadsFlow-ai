<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self';" />
  <title>LeadsFlow — Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
          <polygon points="9,1 2,9 8,9 7,15 14,7 8,7" fill="white"/>
        </svg>
      </div>
      <h1>LeadsFlow</h1>
      <p class="login-subtitle" id="login-subtitle">Entre na sua conta</p>

      <div id="login-error" class="login-error" style="display:none;"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password">Senha</label>
          <input type="password" id="login-password" placeholder="Sua senha" required autocomplete="current-password" />
        </div>
        <div class="form-group" id="confirm-group" style="display:none;">
          <label for="login-confirm">Confirmar senha</label>
          <input type="password" id="login-confirm" placeholder="Repita a senha" autocomplete="new-password" />
        </div>
        <label class="remember-label">
          <input type="checkbox" id="remember-me" />
          <span class="checkmark"></span>
          Lembrar de mim
        </label>
        <button type="submit" id="btn-login" class="btn-login">Entrar</button>
      </form>

      <button id="btn-register" class="btn-register">Criar conta gratuita</button>

      <p class="login-footer">Prospecção inteligente via WhatsApp</p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
